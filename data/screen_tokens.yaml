# ─────────────────────────────────────────────────────────────
# 畫面提示字 tokens 單一來源 (data/screen_tokens.yaml)
# ─────────────────────────────────────────────────────────────
#
# 這份檔案是「畫面提示字 / 按鈕文字 tokens」的可編輯單一來源。
# 遊戲版本更新導致畫面文字改變時,非工程師可直接在這裡改字,不必動 .py。
#
# 規則:
#   - vision/signatures.py 於 import 時讀這份 YAML,把每組載入成 module-level
#     的 tuple 常數;state_detector.py / states.py 一律 from vision import
#     signatures 取用,不會直接讀本檔。
#   - 每個 key 對應一組 token(字串清單)。改字 = 改這裡的清單。
#   - signatures.py 對每組都保留一份「硬寫 fallback」:本檔不存在/壞掉/缺某組時
#     會退回 fallback 並記 warning,絕不會讓程式 import 失敗或行為改變。
#     因此「刪掉某組」不會壞掉程式,但會悄悄退回舊字 —— 要改字請就地改清單,
#     不要整組刪除。
#   - 簡體變體 / OCR 糊字變體刻意保留(實機 EasyOCR 會把字糊成那樣),改字時
#     一併保留變體,否則某些畫面會漏判。每組末尾的中文註解說明該變體來由。
#
# 不在本檔的東西(仍寫在 vision/signatures.py,不要搬進來):
#   - 衍生 / 組合常數(由多組相加,如 EXPLORE_COMPLETE_NEXT_TOKENS、
#     RESULT_NEXT_TOKENS、NPC_DIALOGUE_NEGATIVE_TOKENS)。
#   - 色錨 ColorAnchor、文字判定函式、ScreenSignature / SIGNATURES 簽名表、
#     classify / score_signature 評分邏輯。
#
# key 名 = signatures.py 常數名的小寫;value = 字串清單。
# ─────────────────────────────────────────────────────────────

